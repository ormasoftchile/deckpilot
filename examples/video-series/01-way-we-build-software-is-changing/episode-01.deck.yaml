deck:
  title: Episode 01 — The way we build software is changing
  theme: dark

slides:
  - id: intro
    cues:
      - "I want to talk about two patterns I keep seeing in day-to-day engineering work."
      - "Systems that are not well integrated, and a constant flood of new tools to keep up with."
    duration: 14s

  - id: denser
    cues:
      - "Software work didn't just get faster. It got denser."
      - "More tools, more contexts, more coordination, more decisions per hour."
    duration: 12s

  - id: three-layers
    cues:
      - "Most engineering orgs run on three separate layers."
      - "Code that executes, documentation that describes intent, and operational knowledge that lives in people."
    duration: 15s

  - id: manual-integration
    cues:
      - "These layers are not deeply integrated, so engineers connect them manually."
      - "They translate prose into actions, fill missing assumptions, and patch gaps from memory."
    duration: 14s

  - id: incident-response
    cues:
      - "Incident response: the runbook is mostly text."
      - "Someone has to interpret it under pressure and hope nothing critical was left implicit."
    duration: 12s

  - id: onboarding
    cues:
      - "Onboarding: documents, recordings, tribal advice."
      - "What new engineers actually need is executable knowledge — something that runs, verifies, replays."
    duration: 13s

  - id: tool-growth
    cues:
      - "Now add the second pressure: tool growth."
      - "Every month brings new models, new agent frameworks, new must-know patterns."
    duration: 12s

  - id: tool-cost
    cues:
      - "Each new tool promises leverage, but in aggregate the cost is real."
      - "More surface area, more context switching, more shallow knowledge across too many subjects."
    duration: 14s

  - id: cognitive-overload
    cues:
      - "This creates cognitive overload."
      - "Am I using the right stack? What changed this week? How do I stay current without burning cycles?"
    duration: 13s

  - id: real-problem
    cues:
      - "The real problem is not too many bad tools."
      - "It's tool complexity stacked on systems that were already weakly integrated. That breaks flow."
    duration: 14s

  - id: ai-exposes-debt
    cues:
      - "AI exposes integration debt because it operates on representations."
      - "When workflows are implicit and context is fragmented, the gaps become visible immediately."
      - "It's not just model quality — it's humans reconstructing context manually."
    duration: 20s

  - id: new-framing
    cues:
      - "This changes the question I ask."
      - "Not 'how do I use every new tool', but 'how do I build systems that absorb tool change without overwhelming me'."
    duration: 14s

  - id: direction
    cues:
      - "The direction is practical."
      - "Make knowledge executable, context explicit, workflows reproducible, handoffs machine-readable."
    duration: 13s

  - id: series-intent
    cues:
      - "This is what I'm exploring in this series."
      - "Not chasing trends — designing workflows that are easier to run and easier to maintain."
    duration: 10s

  - id: next-episode
    cues:
      - "Next episode I start with one practical step: turning documentation into executable artifacts."
      - "Because when knowledge can run, you spend less time translating and more time building."
    duration: 14s

recording:
  autoStart: false
  format: mp4

export:
  subtitles: true
  video: true
  srtFormat: srt