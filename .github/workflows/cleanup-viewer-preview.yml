name: Cleanup Viewer PR Preview

on:
  pull_request_target:
    types: [closed]
    branches: [main]

permissions:
  contents: read

jobs:
  close_preview:
    runs-on: ubuntu-latest
    name: Close SWA PR preview
    steps:
      # This workflow is intentionally not path-filtered: every closed PR should
      # attempt cleanup so previews cannot leak when unrelated files changed.
      # pull_request_target exposes repository secrets for fork PR close events;
      # we do not check out or execute PR code, so the token is only passed to
      # Azure's close action for the PR-scoped staging environment. If no
      # preview exists, the close operation is a harmless no-op.
      - name: Close staging environment
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: 'close'
