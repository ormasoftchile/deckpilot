name: Release Extension

on:
  pull_request_target:
    types: [closed]

jobs:
  release:
    name: Release Extension
    if: github.event.pull_request.merged == true && github.event.pull_request.base.ref == 'main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
    - name: Checkout main
      uses: actions/checkout@v4
      with:
        ref: main
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}
        persist-credentials: true

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20.x
        cache: npm

    - name: Install dependencies
      run: npm ci

    - name: Configure Git for version bumping
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
        git fetch origin main --tags
        git checkout main
        git reset --hard origin/main

    - name: Determine release bump
      id: bump_kind
      env:
        PR_TITLE: ${{ github.event.pull_request.title }}
      run: |
        if echo "$PR_TITLE" | grep -q '\[version:major\]'; then
          echo "kind=major" >> "$GITHUB_OUTPUT"
        elif echo "$PR_TITLE" | grep -q '\[version:minor\]'; then
          echo "kind=minor" >> "$GITHUB_OUTPUT"
        else
          echo "kind=patch" >> "$GITHUB_OUTPUT"
        fi

    - name: Bump extension version
      id: version
      run: |
        npm run version:${{ steps.bump_kind.outputs.kind }}
        NEW_VERSION=$(node -p "require('./package.json').version")
        echo "new_version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"
        git add package.json package-lock.json
        git commit -m "chore: bump version to ${NEW_VERSION} [skip ci]"
        git tag "v${NEW_VERSION}"
        git push origin main --tags

    - name: Build extension package
      run: |
        npm run compile
        npm run package

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v${{ steps.version.outputs.new_version }}
        files: '*.vsix'
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Publish to VS Code Marketplace
      env:
        VSCE_PAT: ${{ secrets.VSCE_PAT }}
      run: |
        if [ -n "$VSCE_PAT" ]; then
          npx vsce publish -p "$VSCE_PAT"
        else
          echo "Skipping VS Code Marketplace publish - VSCE_PAT not configured"
        fi
