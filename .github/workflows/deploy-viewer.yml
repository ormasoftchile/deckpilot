name: Deploy Viewer to Azure Static Web Apps

on:
  push:
    branches: [main]
    paths:
      - 'apps/viewer/**'
      - 'packages/core/**'
      - '.github/workflows/deploy-viewer.yml'
      - 'package.json'
      - 'package-lock.json'
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]
    paths:
      - 'apps/viewer/**'
      - 'packages/core/**'
      - '.github/workflows/deploy-viewer.yml'
      - 'package.json'
      - 'package-lock.json'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  build_and_deploy:
    if: github.event_name != 'pull_request' || github.event.action != 'closed'
    runs-on: ubuntu-latest
    name: Build and Deploy
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
          lfs: false

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies (workspace root)
        run: npm ci

      - name: Build viewer
        run: npm run --workspace @deckpilot/viewer build

      - name: Deploy to Azure Static Web Apps
        id: swa
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: 'upload'
          app_location: 'apps/viewer/dist'
          api_location: ''
          output_location: ''
          skip_app_build: true
          skip_api_build: true

