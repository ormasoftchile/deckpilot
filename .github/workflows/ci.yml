name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  validate-pr-title:
    name: Validate PR Title
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
    - name: Check for version tag (advisory)
      env:
        PR_TITLE: ${{ github.event.pull_request.title }}
      run: |
        if echo "$PR_TITLE" | grep -qE '\[(version:(major|minor|patch)|skip ci)\]'; then
          echo "✓ PR title contains a valid version tag"
        else
          echo "⚠ PR title has no version tag; release flow will default to patch bump on main"
          echo "  Title was: $PR_TITLE"
        fi

  test:
    name: Test Suite
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node-version: [20.x]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 1

    - name: Configure Git line endings
      if: runner.os == 'Windows'
      run: |
        git config --global core.autocrlf false
        git config --global core.eol lf

    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Fix line endings on Windows
      if: runner.os == 'Windows'
      run: |
        npx prettier --write . --loglevel error
        
    - name: Run linting
      run: npm run lint

    - name: Run type checking
      run: npx tsc --noEmit

    - name: Run unit tests
      run: npm run test:unit

    - name: Install Playwright browsers
      run: npx playwright install --with-deps chromium

    - name: Setup Xvfb for VS Code tests (Linux)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y xvfb

    - name: Run VS Code extension tests (Linux with Xvfb)
      if: runner.os == 'Linux'
      run: xvfb-run -a npm run test:integration
      continue-on-error: true

    - name: Run VS Code extension tests (Windows/macOS)
      if: runner.os != 'Linux'
      run: npm run test:integration
      continue-on-error: true

  build:
    name: Build Extension
    runs-on: ubuntu-latest
    needs: test

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20.x
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Build extension
      run: npm run vscode:prepublish

    - name: Package extension
      run: npm run package

    - name: Upload VSIX artifact
      uses: actions/upload-artifact@v4
      with:
        name: executable-talk-vsix
        path: '*.vsix'

  security:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20.x
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run security audit
      run: npm audit --audit-level moderate
      continue-on-error: true

